# .github/workflows/ai-service.yml
name: AI Service CI/CD

on:
  push:
    paths: ["ai-service/**", ".github/workflows/ai-service.yml"]
  pull_request:
    paths: ["ai-service/**"]

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: ai-service/requirements.txt

      - name: Instalar dependencias
        working-directory: ai-service
        run: pip install -r requirements.txt

      - name: Lint (flake8)
        working-directory: ai-service
        run: |
          pip install flake8
          flake8 src/ --max-line-length=120 --ignore=E501

      - name: Tests
        working-directory: ai-service
        run: |
          pip install pytest httpx
          pytest tests/ -v

  docker:
    name: Build & Push Docker
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: ./ai-service
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/movie-ai:latest
