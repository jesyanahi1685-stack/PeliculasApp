# .github/workflows/ai-service.yml
name: AI Service CI/CD

on:
  push:
    paths: ["ai-service/**", ".github/workflows/ai-service.yml"]
  pull_request:
    paths: ["ai-service/**"]

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: ai-service/requirements.txt

      - name: Instalar dependencias
        working-directory: ai-service
        run: pip install -r requirements.txt

      - name: Lint (flake8)
        working-directory: ai-service
        run: |
          pip install flake8
          flake8 src/ --max-line-length=120 --ignore=E501

      - name: Tests
        working-directory: ai-service
        run: |
          pip install pytest httpx
          pytest tests/ -v
