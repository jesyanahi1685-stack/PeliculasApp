# .github/workflows/backend.yml
# Se ejecuta en push/PR que toquen archivos del backend o prisma
name: Backend CI/CD

on:
  push:
    paths: ["backend/**", "prisma/**", ".github/workflows/backend.yml"]
  pull_request:
    paths: ["backend/**", "prisma/**"]

jobs:
  # ─── Lint + Test ──────────────────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER:     test_user
          POSTGRES_PASSWORD: test_pass
          POSTGRES_DB:       test_db
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://test_user:test_pass@localhost:5432/test_db
      JWT_SECRET:   test_secret

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Instalar dependencias
        working-directory: backend
        run: npm ci

      - name: Generar Prisma Client
        working-directory: backend
        run: npx prisma generate

      - name: Aplicar migraciones (test DB)
        working-directory: backend
        run: npx prisma migrate deploy

      - name: Lint
        working-directory: backend
        run: npm run lint

      - name: Tests
        working-directory: backend
        run: npm test

  # ─── Build Docker (solo en push a main) ──────────────────
  docker:
    name: Build & Push Docker
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/movie-backend:latest
